name: SEO Audit

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/src/app/**'
      - 'apps/web/src/components/**'
      - 'apps/web/src/lib/**'
      - 'apps/web/scripts/seo-audit.mjs'
      - 'docs/strategy/**'
      - '.github/workflows/seo-audit.yml'
  pull_request:
    paths:
      - 'apps/web/src/app/**'
      - 'apps/web/src/components/**'
      - 'apps/web/src/lib/**'
      - 'apps/web/scripts/seo-audit.mjs'
      - 'docs/strategy/**'
      - '.github/workflows/seo-audit.yml'
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  seo-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run SEO audit
        run: node scripts/seo-audit.mjs
